services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    container_name: effecti_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_URL: http://localhost:8003
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: effecti
      DB_USERNAME: effecti
      DB_PASSWORD: secret
      XDEBUG_MODE: ${XDEBUG_MODE:-debug}
      XDEBUG_CONFIG: client_host=host.docker.internal client_port=9003
      PHP_IDE_CONFIG: serverName=effecti
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./:/var/www
      - composer-cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - effecti

  nginx:
    image: nginx:latest
    container_name: effecti_nginx
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - effecti

  mysql:
    image: mysql:latest
    container_name: effecti_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-effecti}
      MYSQL_USER: ${DB_USERNAME:-effecti}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - ./.docker/mysql/dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$${MYSQL_ROOT_PASSWORD}\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - effecti

networks:
  effecti:
    driver: bridge

volumes:
  composer-cache:
    driver: local
